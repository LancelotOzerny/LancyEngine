<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="engine/styles.min.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<script src="engine/common.min.js"></script>
<script src="engine/core.min.js"></script>
<script src="engine/ui.min.js"></script>


<script>
    let score = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        let game = new Game();
        game.init();
        game.loadAssets({
            images: [
                'assets/sprites/player.png',
            ]
        })
        .then(() => game.start());
    });

    class Hero extends GameObject
    {
        x = 100;
        y = 0;
        vy = 0;

        start = () =>
        {
            super.start();
            this.playerImg = Engine.instance.assets.get('player');
        }

        update = () => {
            this.vy += 0.01 * 9.8 * 8;
            console.log(this.vy)
            this.y += this.vy;

            if (this.y > 500)
            {
                this.vy = -25;
            }
        }

        render = (ctx) =>
        {
            if (this.playerImg) ctx.drawImage(this.playerImg, this.x, this.y);
        }
    }

    class Game
    {
        init()
        {
            this.engine = Engine.instance.init('#game-canvas', {
                width: 1920,
                height: 1080,
            });

            let hero = new Hero();
            let scene__main = new Scene();

            scene__main.gameObjects.append(hero);
            this.engine.scenes.append(scene__main);
        }

        async loadAssets(assets = {
            images: []
        })
        {
            let loadedAssets = await this.engine.assetLoader.loadImages(assets.images);
            Engine.instance.assets = loadedAssets;
        }

        start = () =>
        {
            this.engine.startGameLoop();
        }
    }
</script>
</body>
</html>
