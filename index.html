<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="engine/styles.min.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<script src="engine/common.min.js"></script>
<script src="engine/core.min.js"></script>
<script src="engine/ui.min.js"></script>


<script>
    let score = 0;

    document.addEventListener('DOMContentLoaded', async () => {
        let ui = new UiPanel('Game');
        const engine = Engine.instance.init('#game-canvas');

        /* UI */
        let scoreText = ui.createText({
            text: 'Счёт: 0',
            anchors: 'center center',
            y: -100
        });

        ui.createButton({
            text: 'Click Me!',
            anchors: 'center center',
            click: () => {
                score++;
                scoreText.text = `Счёт: ${score}`;
            }
        });

        let scene = new Scene();
        engine.scenes.append(scene);
        engine.startGameLoop();
    });
</script>
</body>
</html>
