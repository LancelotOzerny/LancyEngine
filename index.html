<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="engine/styles.min.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<script src="engine/math.min.js"></script>
<script src="engine/common.min.js"></script>
<script src="engine/core.min.js"></script>
<script src="engine/components.min.js"></script>
<script src="engine/ui.min.js"></script>

<script src="gameClasses.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', async () =>
    {
        await Engine.instance.run(prepare, {
            images: ['examples/space-shooter/assets/sprites/enemy.png']
        })
    })

    function prepare()
    {
        let mainMenuScene = new Scene();
        Engine.instance.scenes.append(mainMenuScene);

        let player = new GameObject();
        player.sprite = new SpriteComponent({
            sprite: 'enemy'
        });
        player.bindComponent(player.sprite);
        mainMenuScene.gameObjects.append(player)

        Engine.instance.init("#game-canvas", {
            width: 1920,
            height: 1080,
            backgroundColor: "#333",
        });
    }
</script>
</body>
</html>
