<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="engine/styles.min.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<script src="engine/math.min.js"></script>
<script src="engine/common.min.js"></script>
<script src="engine/components.min.js"></script>
<script src="engine/core.min.js"></script>
<script src="engine/ui.min.js"></script>


<script>
    document.addEventListener('DOMContentLoaded', async () => {
        let game = new Game();
        game.init();
        game.loadAssets({
            images: [
                'assets/sprites/player.png',
            ]
        })
        .then(() => game.start());
    });

    class Hero extends GameObject
    {
        init()
        {
            this.physic = new PhysicComponent();
            this.physic.gravityScale = 0;
            this.bindComponent(this.physic);

            this.sprite = new SpriteComponent();
            this.sprite.imageName = 'player'
            this.bindComponent(this.sprite);
        }

        moveSpeed = 100;
        moveX = 0;
        update(deltaTime)
        {
            if (Engine.instance.input.isKeyDown('KeyD')) this.moveX = 1;
            else if (Engine.instance.input.isKeyDown('KeyA')) this.moveX = -1;
            else this.moveX = 0;
            this.transform.rotation += 2;

            if (this.transform.position.x > 1920 - this.sprite.width && this.moveX > 0 ||
                this.transform.position.x < 0 && this.moveX < 0)
            {
                this.moveX = 0;
            }

            this.transform.translate(this.moveX * this.moveSpeed * deltaTime, 0);
        }
    }

    class Game
    {
        init()
        {
            this.engine = Engine.instance;

            /* HERO SET */
            let hero = new Hero();

            /* SCENE SET */
            let scene__main = new Scene();
            scene__main.gameObjects.append(hero);

            this.engine.scenes.append(scene__main);

            this.engine.init('#game-canvas', {
                width: 1920,
                height: 1080,
            });
        }

        async loadAssets(assets = {
            images: []
        })
        {
            let loadedAssets = await this.engine.assetLoader.loadImages(assets.images);
            Engine.instance.assets = loadedAssets;
        }

        start()
        {
            this.engine.startGameLoop();
        }
    }
</script>
</body>
</html>
